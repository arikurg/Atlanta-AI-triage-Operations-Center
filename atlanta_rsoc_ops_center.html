function mkIncident() {
  const t = TEMPLATES[Math.floor(Math.random() * TEMPLATES.length)];
  const minsAgo = Math.floor(Math.random() * 38) + 1;
  return {...t, id:`INC-${String(incCounter++).padStart(4,'0')}`,isLive:true,status:'ACTIVE',
    minsAgo, lat:t.lat+(Math.random()-0.5)*0.004, lng:t.lng+(Math.random()-0.5)*0.004};
}

function nearbyFARS(inc, r=0.07) {
  return FARS.filter(f => Math.sqrt((f.lat-inc.lat)**2+(f.lng-inc.lng)**2) < r);
}

async function callClaude(messages, maxTok=900) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,messages})
  });
  const d = await r.json();
  return d.content.map(c=>c.text||'').join('');
}

async function triageIncident(inc) {
  const hist = nearbyFARS(inc);
  const now = new Date();
  const prompt = `You are ARIA — Atlanta Road Intelligence Advisor for the City of Atlanta Road Safety Operations Center. Analyze this incident and return structured JSON.

ACTIVE INCIDENT: ${JSON.stringify(inc)}

HISTORICAL NHTSA FARS RECORDS NEARBY (within 0.07° radius): ${JSON.stringify(hist)}

CURRENT TIME: ${now.toLocaleTimeString('en-US',{hour12:false})} ${now.toLocaleDateString('en-US',{weekday:'long'})}

Return ONLY raw JSON (absolutely no markdown, no backticks, no commentary):
{"severity_score":<1-10 integer>,"severity_label":"<CRITICAL|HIGH|ELEVATED|MODERATE>","situation_brief":"<2-3 crisp sentences for a dispatcher — what happened, what to expect>","response_units":["<unit>"],"est_clearance_min":<integer>,"lane_impact":"<one short phrase>","priority_actions":["<action1>","<action2>","<action3>"],"escalation_factors":["<factor if any>"],"historical_note":"<one sentence about this corridor from FARS data, or null if no nearby records>"}`;

  const raw = await callClaude([{role:'user',content:prompt}]);
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

ACTIVE INCIDENTS (${liveIncidents.length} total): ${JSON.stringify(liveIncidents.slice(0,8))}
HISTORICAL FARS: ${FARS.length} crash records across Fulton/DeKalb/Cobb/Gwinnett counties 2022-2023. ${FARS.filter(f=>f.severity==='FATAL').length} fatal incidents recorded.

OPERATOR QUERY: "${q}"

Respond in 2-4 sentences. Be direct. No preamble. No disclaimers.`;
  return callClaude([{role:'user',content:prompt}], 400);
}

// ── UI HELPERS ──────────────────────────────────────────────────

function badge(sev) {
  const s = SEV[sev]||SEV.MINOR;
  return `<span style="padding:2px 6px;border-radius:2px;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;color:${s.c};background:${s.bg};border:1px solid ${s.bd}">${sev}</span>`;
}

function renderCard(inc, isNew) {
  const s = SEV[inc.severity]||SEV.MINOR;
  const isSel = selectedInc && selectedInc.id === inc.id;
  const timeStr = inc.isLive ? (inc.minsAgo===0?'just now':`${inc.minsAgo}m ago`) : inc.date;
  const dot = inc.isLive ? `<span style="margin-right:3px;color:${s.c}">${inc.minsAgo===0?'<span class="blink">●</span>':'●'}</span>` : '○ ';
  return `<div id="card-${inc.id}" class="${isNew?'new-card':''}" onclick="selectIncident('${inc.id}')" style="padding:8px 9px;margin-bottom:3px;cursor:pointer;background:${isSel?s.bg:C.panel2};border:1px solid ${isSel?s.bd:C.b1};border-left:3px solid ${s.c};border-radius:3px;transition:all 0.12s">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
    <span style="color:${s.c};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.04em;line-height:1.2;flex:1;padding-right:6px">${dot}${inc.type||inc.id}</span>
    ${badge(inc.severity)}
  </div>
  <div style="color:${C.text2};font-size:10px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${inc.location}</div>
  <div style="display:flex;justify-content:space-between">
    <span style="color:${C.muted};font-family:'IBM Plex Mono',monospace;font-size:8px">${inc.id}</span>
    <span style="color:${C.text2};font-family:'IBM Plex Mono',monospace;font-size:8px">${timeStr}</span>
  </div>
</div>`;
}

function renderList() {
  const list = currentTab === 'LIVE' ? liveIncidents : FARS;
  document.getElementById('incident-list').innerHTML = list.map(inc=>renderCard(inc,false)).join('');
  document.getElementById('feed-label').textContent = currentTab === 'LIVE'
    ? `${liveIncidents.length} active incidents · Atlanta metro`
    : `${FARS.length} records · NHTSA FARS 2022–2023`;
  document.getElementById('live-count').textContent = `(${liveIncidents.length})`;
}

function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-live').style.cssText = t==='LIVE'
    ? 'flex:1;padding:7px 0;background:#0C1220;border:none;border-bottom:2px solid #00D2E0;color:#C0CFDF;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;cursor:pointer'
    : 'flex:1;padding:7px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:#3A4F6C;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;cursor:pointer';
  document.getElementById('tab-hist').style.cssText = t==='HIST'
    ? 'flex:1;padding:7px 0;background:#0C1220;border:none;border-bottom:2px solid #00D2E0;color:#C0CFDF;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;cursor:pointer'
    : 'flex:1;padding:7px 0;background:transparent;border:none;border-bottom:2px solid transparent;color:#3A4F6C;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:11px;letter-spacing:0.1em;cursor:pointer';
  renderList();
}

function updateStats() {
  document.getElementById('stat-active').querySelector('div').textContent = liveIncidents.length;
  document.getElementById('stat-critical').querySelector('div').textContent = liveIncidents.filter(i=>i.severity==='FATAL').length;
  document.getElementById('stat-resolved').querySelector('div').textContent = Object.values(decisions).length;
}

function selectIncident(id) {
  const inc = [...liveIncidents,...FARS].find(i=>i.id===id);
  if(!inc) return;
  selectedInc = inc;
  if(inc.isLive && currentTab!=='LIVE') switchTab('LIVE');
  else if(!inc.isLive && currentTab!=='HIST') switchTab('HIST');
  else renderList();
  renderAIPanel(inc);
  if(leafletMap) leafletMap.setView([inc.lat,inc.lng],13,{animate:true,duration:0.4});
  updateMapMarkers();
}

function logDecision(id, action) {
  decisions[id] = {action, time: new Date().toLocaleTimeString('en-US',{hour12:false})};
  updateStats();
  const dec = decisions[id];
  const decDiv = document.getElementById('decision-area');
  if(decDiv) {
    const col = action==='ACCEPTED'?C.green:action==='ESCALATED'?C.red:C.amber;
    decDiv.innerHTML = `<div style="padding:7px;background:${col}10;border:1px solid ${col}30;border-radius:3px;text-align:center"><span style="color:${col};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.08em">✓ ${action} · ${dec.time}</span></div>`;
  }
}

async function renderAIPanel(inc) {
  const panel = document.getElementById('ai-panel');
  const s = SEV[inc.severity]||SEV.MINOR;
  const dec = decisions[inc.id];

  panel.innerHTML = `<div style="padding:10px 12px;border-bottom:1px solid ${C.b1};flex-shrink:0;background:${C.panel}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:${C.text};letter-spacing:0.04em;line-height:1.2;flex:1;padding-right:8px">${inc.type||inc.id}</div>
      ${badge(inc.severity)}
    </div>
    <div style="color:${C.text2};font-size:10px;margin-bottom:8px">${inc.location}</div>
    <div style="display:flex;gap:12px">
      <div><div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em">VEH</div><div style="color:${C.text};font-family:'IBM Plex Mono',monospace;font-size:16px;line-height:1">${inc.vehicles||0}</div></div>
      <div><div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em">INJ</div><div style="color:${C.text};font-family:'IBM Plex Mono',monospace;font-size:16px;line-height:1">${inc.injuries??'—'}</div></div>
      <div><div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em">FAT</div><div style="color:${(inc.fatalities??0)>0?C.red:C.text};font-family:'IBM Plex Mono',monospace;font-size:16px;line-height:1">${inc.fatalities??'—'}</div></div>
      <div style="margin-left:auto"><div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em">COND</div><div style="color:${C.text2};font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:3px">${inc.weather||'—'}/${inc.road||'—'}</div></div>
    </div>
  </div>
  <div id="aria-analysis" style="padding:10px 12px">
    <div style="display:flex;align-items:center;gap:8px;color:${C.text2};padding:10px 0">
      <div style="width:6px;height:6px;background:${C.cyan};border-radius:50%" class="blink"></div>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-style:italic">ARIA analyzing incident...</span>
    </div>
  </div>`;

  try {
    const triage = await triageIncident(inc);
    const sc = triage.severity_score>=8?C.red:triage.severity_score>=6?C.amber:C.green;
    const isLive = inc.isLive;
    const btns = isLive
      ? [{l:'ACCEPT',c:C.green,a:'ACCEPTED'},{l:'OVERRIDE',c:C.amber,a:'OVERRIDDEN'},{l:'ESCALATE',c:C.red,a:'ESCALATED'}]
      : [{l:'LOG ANALYSIS',c:C.blue,a:'ANALYSIS LOGGED'},{l:'FLAG CORRIDOR',c:C.amber,a:'CORRIDOR FLAGGED'},{l:'MARK REVIEWED',c:C.green,a:'REVIEWED'}];

    const analysisEl = document.getElementById('aria-analysis');
    if(!analysisEl) return;
    analysisEl.className = 'fade-up';
    analysisEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:${sc}10;border:1px solid ${sc}28;border-radius:3px;margin-bottom:10px">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:38px;font-weight:500;color:${sc};line-height:1">${triage.severity_score}</div>
        <div>
          <div style="color:${sc};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.1em">${triage.severity_label}</div>
          <div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;margin-top:1px">ARIA SEVERITY /10</div>
        </div>
      </div>

      <div style="margin-bottom:10px">
        <div style="color:${C.muted};font-size:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;margin-bottom:4px">SITUATION BRIEF</div>
        <div style="color:${C.text2};font-size:10px;line-height:1.65;padding-left:8px;border-left:2px solid ${C.b2}">${triage.situation_brief}</div>
      </div>

      <div style="display:flex;gap:5px;margin-bottom:10px">
        <div style="flex:1;padding:5px 8px;background:${C.panel2};border:1px solid ${C.b1};border-radius:3px">
          <div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;margin-bottom:2px">EST CLEARANCE</div>
          <div style="color:${C.text};font-family:'IBM Plex Mono',monospace;font-size:10px">${triage.est_clearance_min} min</div>
        </div>
        <div style="flex:1;padding:5px 8px;background:${C.panel2};border:1px solid ${C.b1};border-radius:3px">
          <div style="color:${C.muted};font-size:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;margin-bottom:2px">LANE IMPACT</div>
          <div style="color:${C.text};font-family:'IBM Plex Mono',monospace;font-size:10px">${(triage.lane_impact||'—').substring(0,20)}</div>
        </div>
      </div>

      <div style="margin-bottom:10px">
        <div style="color:${C.muted};font-size:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;margin-bottom:5px">RECOMMENDED UNITS</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${(triage.response_units||[]).map(u=>`<span style="padding:3px 7px;background:${C.cyan}12;border:1px solid ${C.cyan}30;border-radius:2px;color:${C.cyan};font-size:9px;font-family:'IBM Plex Mono',monospace">${u}</span>`).join('')}</div>
      </div>

      <div style="margin-bottom:10px">
        <div style="color:${C.muted};font-size:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;margin-bottom:5px">PRIORITY ACTIONS</div>
        ${(triage.priority_actions||[]).map((a,i)=>`<div style="display:flex;gap:7px;margin-bottom:5px;align-items:flex-start"><span style="color:${C.amber};font-family:'IBM Plex Mono',monospace;font-size:9px;min-width:12px;flex-shrink:0">${i+1}.</span><span style="color:${C.text2};font-size:10px;line-height:1.5">${a}</span></div>`).join('')}
      </div>

      ${triage.historical_note?`<div style="padding:7px 9px;background:${C.blue}0C;border:1px solid ${C.blue}20;border-radius:3px;margin-bottom:10px">
        <div style="color:${C.muted};font-size:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;margin-bottom:3px">HISTORICAL CONTEXT · NHTSA FARS</div>
        <div style="color:${C.blue};font-size:10px;line-height:1.55">${triage.historical_note}</div>
      </div>`:''}

      <div id="decision-area">
        ${dec
          ? `<div style="padding:7px;background:${dec.action==='ACCEPTED'?C.green:dec.action==='ESCALATED'?C.red:C.amber}10;border:1px solid ${dec.action==='ACCEPTED'?C.green:dec.action==='ESCALATED'?C.red:C.amber}30;border-radius:3px;text-align:center"><span style="color:${dec.action==='ACCEPTED'?C.green:dec.action==='ESCALATED'?C.red:C.amber};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:0.08em">✓ ${dec.action} · ${dec.time}</span></div>`
          : `<div style="display:flex;gap:5px">${btns.map(b=>`<button onclick="logDecision('${inc.id}','${b.a}')" style="flex:1;padding:7px 4px;background:${b.c}12;border:1px solid ${b.c}40;border-radius:3px;color:${b.c};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.08em;cursor:pointer">${b.l}</button>`).join('')}</div>`
        }
      </div>`;
  } catch(e) {
    const el = document.getElementById('aria-analysis');
    if(el) el.innerHTML = `<div style="color:${C.red};font-size:10px;font-family:'IBM Plex Mono',monospace;padding:8px 0">Analysis failed — check API connection</div>`;
  }
}

async function submitQuery() {
  const input = document.getElementById('nl-input');
  const q = input.value.trim();
  if(!q) return;
  const btn = document.getElementById('query-btn');
  btn.textContent = '..';
  btn.disabled = true;
  const resDiv = document.getElementById('aria-response');
  resDiv.style.display = 'flex';
  resDiv.innerHTML = `<span style="color:${C.cyan};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.1em;flex-shrink:0;margin-top:1px">ARIA ▶</span><span style="color:${C.text2};font-size:10px;font-style:italic" class="blink">thinking...</span>`;
  try {
    const ans = await runNLQuery(q);
    resDiv.innerHTML = `<span style="color:${C.cyan};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.1em;flex-shrink:0;margin-top:1px">ARIA ▶</span><span style="color:${C.text2};font-size:10px;line-height:1.65">${ans}</span>`;
  } catch { resDiv.innerHTML = `<span style="color:${C.red};font-size:10px;font-family:'IBM Plex Mono',monospace">Query failed.</span>`; }
  btn.textContent = 'SEND'; btn.disabled = false; input.value = '';
}

document.getElementById('nl-input').addEventListener('keydown', e => { if(e.key==='Enter') submitQuery(); });

// ── MAP ─────────────────────────────────────────────────────────

function initMap() {
  const L = window.L;
  leafletMap = L.map('map', {zoomControl:true,attributionControl:false}).setView([33.749,-84.388],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leafletMap);
  updateMapMarkers();
}

function updateMapMarkers() {
  if(!leafletMap) return;
  const L = window.L;
  Object.values(mapMarkers).forEach(m=>leafletMap.removeLayer(m));
  mapMarkers = {};

  FARS.forEach(f=>{
    const s = SEV[f.severity]||SEV.MINOR;
    const icon = L.divIcon({
      html:`<div style="width:7px;height:7px;border-radius:50%;background:${s.c};opacity:0.55;border:1px solid ${s.c}"></div>`,
      iconSize:[7,7],iconAnchor:[3,3],className:''
    });
    const m = L.marker([f.lat,f.lng],{icon}).addTo(leafletMap);
    m.bindPopup(`<b>${f.location}</b><br>${f.severity} · ${f.date}<br>Factors: ${f.factors.join(', ')}<br>Vehicles: ${f.vehicles} · Fatalities: ${f.fatalities}`);
    m.on('click',()=>{selectedInc=f;if(currentTab!=='HIST')switchTab('HIST');else renderList();renderAIPanel(f);updateMapMarkers();});
    mapMarkers[f.id]=m;
  });

  liveIncidents.forEach(inc=>{
    const s = SEV[inc.severity]||SEV.MINOR;
    const isSel = selectedInc?.id===inc.id;
    const sz = isSel?16:12;
    const icon = L.divIcon({
      html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${s.c};border:2px solid #fff;box-shadow:0 0 ${isSel?14:7}px ${s.c}80"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],className:''
    });
    const m = L.marker([inc.lat,inc.lng],{icon}).addTo(leafletMap);
    m.bindPopup(`<b>● LIVE: ${inc.type}</b><br>${inc.location}<br>${inc.severity} · ${inc.minsAgo}m ago`);
    m.on('click',()=>{selectedInc=inc;if(currentTab!=='LIVE')switchTab('LIVE');else renderList();renderAIPanel(inc);updateMapMarkers();});
    mapMarkers[inc.id]=m;
  });
}

// ── INIT ────────────────────────────────────────────────────────

liveIncidents = Array.from({length:7},mkIncident);
renderList();
updateStats();

function tick() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US',{hour12:false});
}
tick();
setInterval(tick,1000);

setInterval(()=>{
  if(Math.random()<0.35){
    const n = mkIncident();
    liveIncidents = [n,...liveIncidents.slice(0,9)];
    renderList();
    updateStats();
    updateMapMarkers();
  }
},28000);

if(window.L) { initMap(); }
else { const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js'; s.onload=initMap; document.head.appendChild(s); }

// Select first incident on load
setTimeout(()=>{ if(liveIncidents.length) selectIncident(liveIncidents[0].id); }, 800);
</script>
